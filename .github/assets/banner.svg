<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6ee7b7" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6ee7b7" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6ee7b7" stroke-width="0.5">
    <line x1="0"   y1="35"  x2="900" y2="35"/>
    <line x1="0"   y1="70"  x2="900" y2="70"/>
    <line x1="0"   y1="105" x2="900" y2="105"/>
    <line x1="150" y1="0"   x2="150" y2="140"/>
    <line x1="300" y1="0"   x2="300" y2="140"/>
    <line x1="450" y1="0"   x2="450" y2="140"/>
    <line x1="600" y1="0"   x2="600" y2="140"/>
    <line x1="750" y1="0"   x2="750" y2="140"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="900" height="2" rx="1" fill="url(#line)" opacity="0.8"/>

  <!-- Package badge -->
  <rect x="36" y="28" width="140" height="20" rx="10" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
  <circle cx="52" cy="38" r="4" fill="#6ee7b7" opacity="0.8"/>
  <text x="62" y="42" font-size="10" fill="#6ee7b7" letter-spacing="0.1em" font-weight="500">LARAVEL PACKAGE</text>

  <!-- Title -->
  <text x="36" y="84" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="-0.02em">phone-country-resolver</text>

  <!-- Subtitle -->
  <text x="36" y="108" font-size="13" fill="#7a8099" letter-spacing="0.01em">
    Resolve ISO country codes from phone numbers  ·  AI-powered  ·  Zero dependencies
  </text>

  <!-- Right side — feature pills -->
  <g transform="translate(596, 38)">
    <rect x="0"   y="0"  width="90"  height="18" rx="9" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.2)" stroke-width="0.8"/>
    <text x="45"  y="13" text-anchor="middle" font-size="9.5" fill="#6ee7b7" letter-spacing="0.04em">Normalization</text>

    <rect x="0"   y="24" width="90"  height="18" rx="9" fill="rgba(251,146,60,0.08)"  stroke="rgba(251,146,60,0.2)"  stroke-width="0.8"/>
    <text x="45"  y="37" text-anchor="middle" font-size="9.5" fill="#fb923c" letter-spacing="0.04em">Disambiguation</text>

    <rect x="98"  y="0"  width="90"  height="18" rx="9" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.2)" stroke-width="0.8"/>
    <text x="143" y="13" text-anchor="middle" font-size="9.5" fill="#f87171" letter-spacing="0.04em">Fraud detection</text>

    <rect x="98"  y="24" width="90"  height="18" rx="9" fill="rgba(74,222,128,0.08)"  stroke="rgba(74,222,128,0.2)"  stroke-width="0.8"/>
    <text x="143" y="37" text-anchor="middle" font-size="9.5" fill="#4ade80" letter-spacing="0.04em">Metadata</text>

    <rect x="196" y="0"  width="90"  height="18" rx="9" fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.2)" stroke-width="0.8"/>
    <text x="241" y="13" text-anchor="middle" font-size="9.5" fill="#818cf8" letter-spacing="0.04em">180+ countries</text>

    <rect x="196" y="24" width="90"  height="18" rx="9" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.2)" stroke-width="0.8"/>
    <text x="241" y="37" text-anchor="middle" font-size="9.5" fill="#f472b6" letter-spacing="0.04em">Explanation</text>
  </g>
</svg>
