<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#3d4556" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111519"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bg)"/>
  <rect width="900" height="280" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="11" fill="#4a5168" letter-spacing="0.12em" font-weight="500">ANALYZE() PIPELINE</text>

  <!-- ── INPUT ── -->
  <rect x="20" y="100" width="90" height="48" rx="8" fill="#161b22" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="65" y="121" text-anchor="middle" font-size="11" fill="#6a7491" font-weight="500">Raw input</text>
  <text x="65" y="137" text-anchor="middle" font-size="9"  fill="#3d4556" font-family="monospace">any format</text>

  <!-- arrow -->
  <line x1="110" y1="124" x2="130" y2="124" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── STEP 1: Normalize ── -->
  <rect x="132" y="84" width="118" height="80" rx="8" fill="#0d1a13" stroke="rgba(110,231,183,0.3)" stroke-width="1"/>
  <rect x="132" y="84" width="118" height="3"  rx="1.5" fill="#6ee7b7" opacity="0.8"/>
  <text x="141" y="107" font-size="9"  fill="#3d6652" letter-spacing="0.1em">STEP 1</text>
  <text x="191" y="126" text-anchor="middle" font-size="12" fill="#6ee7b7" font-weight="600">Normalize</text>
  <text x="191" y="142" text-anchor="middle" font-size="9"  fill="#3d6652">Repair messy input</text>
  <text x="191" y="156" text-anchor="middle" font-size="8"  fill="#2d4a3a" font-family="monospace">PhoneNormalizer</text>

  <!-- arrow -->
  <line x1="250" y1="124" x2="270" y2="124" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── STEP 2: Resolve ── -->
  <rect x="272" y="84" width="118" height="80" rx="8" fill="#0d1118" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
  <rect x="272" y="84" width="118" height="3"  rx="1.5" fill="#818cf8" opacity="0.8"/>
  <text x="281" y="107" font-size="9"  fill="#3d4068" letter-spacing="0.1em">STEP 2</text>
  <text x="331" y="126" text-anchor="middle" font-size="12" fill="#818cf8" font-weight="600">Resolve</text>
  <text x="331" y="142" text-anchor="middle" font-size="9"  fill="#3d4068">Longest-prefix match</text>
  <text x="331" y="156" text-anchor="middle" font-size="8"  fill="#2d2f50" font-family="monospace">PhoneCountryService</text>

  <!-- arrow -->
  <line x1="390" y1="124" x2="410" y2="124" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── STEP 3: Disambiguate ── -->
  <rect x="412" y="84" width="118" height="80" rx="8" fill="#18120a" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <rect x="412" y="84" width="118" height="3"  rx="1.5" fill="#fb923c" opacity="0.8"/>
  <text x="421" y="107" font-size="9"  fill="#6b4e22" letter-spacing="0.1em">STEP 3</text>
  <text x="471" y="126" text-anchor="middle" font-size="12" fill="#fb923c" font-weight="600">Disambiguate</text>
  <text x="471" y="142" text-anchor="middle" font-size="9"  fill="#6b4e22">+1 area-code map</text>
  <text x="471" y="156" text-anchor="middle" font-size="8"  fill="#4a3318" font-family="monospace">NanpDisambiguator</text>

  <!-- fork arrow up -->
  <path d="M530 124 L550 124 L550 90 L570 90" fill="none" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- fork arrow down -->
  <path d="M530 124 L550 124 L550 158 L570 158" fill="none" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── STEP 4: Fraud ── -->
  <rect x="572" y="52" width="118" height="76" rx="8" fill="#18090a" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <rect x="572" y="52" width="118" height="3"  rx="1.5" fill="#f87171" opacity="0.8"/>
  <text x="581" y="74" font-size="9"  fill="#6b2e2e" letter-spacing="0.1em">STEP 4</text>
  <text x="631" y="93"  text-anchor="middle" font-size="12" fill="#f87171" font-weight="600">Fraud detect</text>
  <text x="631" y="109" text-anchor="middle" font-size="9"  fill="#6b2e2e">Risk score 0–100</text>
  <text x="631" y="121" text-anchor="middle" font-size="8"  fill="#4a2020" font-family="monospace">FraudDetector</text>

  <!-- ── STEP 5: Enrich ── -->
  <rect x="572" y="140" width="118" height="76" rx="8" fill="#091409" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <rect x="572" y="140" width="118" height="3"  rx="1.5" fill="#4ade80" opacity="0.6"/>
  <text x="581" y="162" font-size="9"  fill="#2d5030" letter-spacing="0.1em">STEP 5</text>
  <text x="631" y="181" text-anchor="middle" font-size="12" fill="#4ade80" font-weight="600">Enrich</text>
  <text x="631" y="197" text-anchor="middle" font-size="9"  fill="#2d5030">Timezone · Currency</text>
  <text x="631" y="209" text-anchor="middle" font-size="8"  fill="#1d3820" font-family="monospace">MetadataEnricher</text>

  <!-- arrows right from fraud/enrich to joiner -->
  <line x1="690" y1="90"  x2="716" y2="90"  stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="690" y1="178" x2="716" y2="178" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- vertical joiner -->
  <line x1="716" y1="90" x2="716" y2="178" stroke="#3d4556" stroke-width="1.2"/>
  <line x1="716" y1="134" x2="730" y2="134" stroke="#3d4556" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── STEP 6: Explain ── -->
  <rect x="200" y="196" width="400" height="52" rx="8" fill="#130d15" stroke="rgba(244,114,182,0.25)" stroke-width="1"/>
  <rect x="200" y="196" width="400" height="3"  rx="1.5" fill="#f472b6" opacity="0.6"/>
  <text x="209" y="218" font-size="9"  fill="#5c2a45" letter-spacing="0.1em">STEP 6</text>
  <text x="400" y="230" text-anchor="middle" font-size="12" fill="#f472b6" font-weight="600">Explain</text>
  <text x="400" y="242" text-anchor="middle" font-size="9"  fill="#5c2a45">Plain-language description  ·  PhoneExplainer</text>

  <!-- arrows down from fraud and enrich to explain -->
  <path d="M631 128 Q631 172 400 196" fill="none" stroke="#3d4556" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <path d="M631 216 Q631 260 400 248" fill="none" stroke="#3d4556" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <!-- ── OUTPUT ── -->
  <rect x="732" y="100" width="108" height="68" rx="8" fill="#10141f" stroke="rgba(129,140,248,0.3)" stroke-width="1"/>
  <rect x="732" y="100" width="108" height="3"  rx="1.5" fill="#818cf8" opacity="0.5"/>
  <text x="786" y="124" text-anchor="middle" font-size="11" fill="#818cf8" font-weight="600">PhoneAnalysis</text>
  <text x="786" y="140" text-anchor="middle" font-size="9"  fill="#3d4068">isSafe()</text>
  <text x="786" y="155" text-anchor="middle" font-size="9"  fill="#3d4068">toArray()</text>

  <!-- bottom label -->
  <text x="450" y="265" text-anchor="middle" font-size="10" fill="#2d3347">Zero dependencies · No LLM · No API key required</text>
</svg>
